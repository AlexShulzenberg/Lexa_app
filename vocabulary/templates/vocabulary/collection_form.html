{% extends 'vocabulary/base.html' %}
{% block title %}Lexa — {{ action }} Collection{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <div class="page-title">{{ action }} collection</div>
    </div>
    <a href="{% url 'collections' %}" class="btn btn-secondary">← Back</a>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Name *</label>
            {{ form.name }}
            {% if form.name.errors %}
                <div class="field-error">{{ form.name.errors.0 }}</div>
            {% endif %}
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            {{ form.description }}
        </div>
        <div style="display:flex; gap:12px; margin-top:8px">
            <button type="submit" class="btn btn-primary">
                {% if action == 'Create' %}Create collection{% else %}Save changes{% endif %}
            </button>
            <a href="{% url 'collections' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
